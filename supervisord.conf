[supervisord]
nodaemon=true

[program:xvfb]
priority=5
command=/usr/bin/Xvfb :99 -screen 0 1024x768x24
autorestart=true

# 🔹 Gazebo (headless)
[program:gazebo]
priority=10
environment=ROS_USE_SIM_TIME=true
command=/bin/bash -c "export QT_QPA_PLATFORM=offscreen && export QT_QUICK_BACKEND=software && export LIBGL_ALWAYS_SOFTWARE=1 && export GZ_SIM_RENDER_ENGINE=ogre2 && source /opt/ros/jazzy/setup.bash && export TURTLEBOT3_MODEL=burger && gz sim -r -s /opt/ros/jazzy/share/turtlebot3_gazebo/worlds/empty_world.world"
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0

# 🔹 ROS-Gazebo bridge
[program:bridge]
priority=20
environment=ROS_USE_SIM_TIME=true
command=/bin/bash -c "sleep 5 && source /opt/ros/jazzy/setup.bash && ros2 run ros_gz_bridge parameter_bridge /cmd_vel@geometry_msgs/msg/Twist@gz.msgs.Twist /clock@rosgraph_msgs/msg/Clock@gz.msgs.Clock"
autorestart=true
startsecs=2
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0

# 🔹 Foxglove
[program:foxglove]
priority=30
environment=ROS_USE_SIM_TIME=true
command=/bin/bash -c "source /opt/ros/jazzy/setup.bash && ros2 launch foxglove_bridge foxglove_bridge_launch.xml port:=8765 address:=0.0.0.0"
autorestart=true
startsecs=2
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0

# 🔹 Turtlesim (headless via Xvfb)
[program:turtlesim]
priority=40
environment=DISPLAY=:99,ROS_USE_SIM_TIME=false
command=/bin/bash -c "source /opt/ros/jazzy/setup.bash && ros2 run turtlesim turtlesim_node"
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr

[program:turtle_3d]
priority=45
command=/bin/bash -c "source /opt/ros/jazzy/setup.bash && python3 /workspace/turtle_3d.py"
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0