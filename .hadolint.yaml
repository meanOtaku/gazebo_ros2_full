# -----------------------------
# Hadolint Configuration
# -----------------------------

# Fail only on real errors (warnings allowed via CI config)
failure-threshold: error

# -----------------------------
# Ignore rules (practical setup)
# -----------------------------
ignored:
  # Version pinning (not practical for ROS images)
  - DL3008   # apt-get install version pinning
  - DL3016   # npm version pinning

  # Optional optimizations (not critical)
  - DL3015   # --no-install-recommends
  - DL3009   # delete apt lists (you already handle this mostly)
  - DL3059   # multiple RUN layers (fine for readability)

  # Shell strictness (nice but not required)
  - DL4006   # pipefail

# -----------------------------
# Trusted registries
# -----------------------------
trustedRegistries:
  - docker.io
  - ghcr.io

# -----------------------------
# Override severity (optional tuning)
# -----------------------------
override:
  warning:
    - DL3025   # Use JSON form of CMD (not critical for your use)
  info:
    - DL3042   # Avoid cache busting (fine in CI context)

# -----------------------------
# Label schema (optional)
# -----------------------------
label-schema:
  author: text
  version: semver
  description: text

# -----------------------------
# Strict labels disabled
# -----------------------------
strict-labels: false