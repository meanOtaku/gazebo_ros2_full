name: ROS2 CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # -----------------------------
      # Lint Dockerfile
      # -----------------------------
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0

      # -----------------------------
      # Setup Docker
      # -----------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------
      # Login to GHCR
      # -----------------------------
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------
      # Build (with cache)
      # -----------------------------
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------
      # Test ROS2 basic
      # -----------------------------
      - name: Test ROS2 CLI
        run: |
          docker run --rm ${{ env.IMAGE_NAME }}:latest \
          bash -c "source /opt/ros/jazzy/setup.bash && ros2 --help"

      # -----------------------------
      # Test colcon build (optional)
      # -----------------------------
      - name: Test ROS2 workspace build
        if: hashFiles('ros2_ws/src/**') != ''
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/ros2_ws:/workspace \
            ${{ env.IMAGE_NAME }}:latest \
            bash -c "source /opt/ros/jazzy/setup.bash && cd /workspace && colcon build"

      # -----------------------------
      # Test headless Gazebo (optional)
      # -----------------------------
      - name: Test Gazebo headless
        run: |
          docker run --rm ${{ env.IMAGE_NAME }}:latest \
          bash -c "gz sim -r -s empty.sdf --iterations 5"

      # -----------------------------
      # Push image (only on main)
      # -----------------------------
      - name: Push to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha