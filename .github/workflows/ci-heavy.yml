name: CI Heavy + CD

on:
  push:
    branches: [ "main" ]

concurrency:
  group: ci-heavy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  heavy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # Checkout
      - uses: actions/checkout@v4

      # Setup Docker
      - uses: docker/setup-buildx-action@v3

      # Login to GHCR
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build (cached)
      - name: Build Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ROS2 CLI test
      - name: Test ROS2 CLI
        run: |
          docker run --rm ${{ env.IMAGE_NAME }}:latest \
          bash -c "source /opt/ros/jazzy/setup.bash && ros2 --help"

      # ROS2 workspace build (if exists)
      - name: Build ROS2 workspace
        if: hashFiles('ros2_ws/src/**') != ''
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/ros2_ws:/workspace \
            ${{ env.IMAGE_NAME }}:latest \
            bash -c "source /opt/ros/jazzy/setup.bash && cd /workspace && colcon build"

      # Gazebo headless test
      - name: Test Gazebo headless
        run: |
          docker run --rm ${{ env.IMAGE_NAME }}:latest \
          bash -c "gz sim -r -s empty.sdf --iterations 5"

      # Push to GHCR (latest + commit SHA)
      - name: Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha