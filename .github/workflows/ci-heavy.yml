name: CI Heavy + CD

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

concurrency:
  group: ci-heavy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  heavy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Normalize image name
        run: |
          IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY}
          echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> $GITHUB_ENV

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Fast test build (amd64 only)
      - name: Build Docker (test)
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          push: false
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME_LC }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test ROS2 CLI
        run: |
          docker run --rm ${{ env.IMAGE_NAME_LC }}:latest \
          bash -c "source /opt/ros/jazzy/setup.bash && ros2 --help"

      - name: Build ROS2 workspace
        if: hashFiles('ros2_ws/src/**') != ''
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/ros2_ws:/workspace \
            ${{ env.IMAGE_NAME_LC }}:latest \
            bash -c "source /opt/ros/jazzy/setup.bash && cd /workspace && colcon build"

      - name: Test Gazebo headless
        run: |
          docker run --rm ${{ env.IMAGE_NAME_LC }}:latest \
          bash -c "gz sim -r -s empty.sdf --iterations 5"

      # Multi-arch build (only here)
      - name: Build & Push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME_LC }}:latest
            ${{ env.IMAGE_NAME_LC }}:${{ github.sha }}
          cache-from: type=gha