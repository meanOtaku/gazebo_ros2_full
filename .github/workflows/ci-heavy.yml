name: Build & Push Multi-Arch Image

on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.github/workflows/ci-heavy.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # -----------------------------
      # Checkout
      # -----------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # Normalize image name (LOWERCASE FIX)
      # -----------------------------
      - name: Set image name
        run: |
          IMAGE_NAME=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV

      # -----------------------------
      # Setup QEMU (multi-arch)
      # -----------------------------
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # -----------------------------
      # Setup Buildx
      # -----------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -----------------------------
      # Login to GHCR
      # -----------------------------
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------
      # Build + Push (with CACHE 🔥)
      # -----------------------------
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true

          tags: |
            ${{ env.IMAGE_NAME }}:latest

          platforms: linux/amd64,linux/arm64

          # 🔥 CACHE (critical for speed)
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:cache,mode=max

          # Optional but reduces noise
          provenance: false