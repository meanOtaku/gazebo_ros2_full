name: CI Fast (PR)

on:
  pull_request:
  push:
    branches-ignore: [ "main" ]

concurrency:
  group: ci-fast-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-check:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # Checkout
      - uses: actions/checkout@v4

      # 🔥 Normalize image name (FIX)
      - name: Normalize image name
        run: |
          IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY}
          echo "IMAGE_NAME_LC=${IMAGE_NAME,,}" >> $GITHUB_ENV

      # Lint Dockerfile
      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          config: .hadolint.yaml
          failure-threshold: error

      # Setup Docker
      - uses: docker/setup-buildx-action@v3

      # Build (cached, no push)
      - name: Build Docker (fast)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true   # ✅ fixes warning
          tags: ${{ env.IMAGE_NAME_LC }}:pr
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Quick ROS2 sanity test
      - name: Test ROS2 CLI
        run: |
          docker run --rm ${{ env.IMAGE_NAME_LC }}:pr \
          bash -c "source /opt/ros/jazzy/setup.bash && ros2 --help"